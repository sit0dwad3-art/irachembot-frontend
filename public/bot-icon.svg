<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Fondo circular degradado -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="face" x1="20" y1="20" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>

  <!-- Cuerpo principal -->
  <rect width="80" height="80" rx="20" fill="url(#bg)"/>

  <!-- Antena -->
  <rect x="37" y="6" width="6" height="12" rx="3" fill="#a5b4fc"/>
  <circle cx="40" cy="5" r="4" fill="#c7d2fe"/>

  <!-- Cabeza del robot -->
  <rect x="16" y="18" width="48" height="38" rx="10" fill="url(#face)"/>

  <!-- Ojos -->
  <rect x="24" y="28" width="12" height="10" rx="4" fill="#4f46e5"/>
  <rect x="44" y="28" width="12" height="10" rx="4" fill="#4f46e5"/>
  <!-- Brillo ojos -->
  <circle cx="28" cy="31" r="2" fill="#a5b4fc"/>
  <circle cx="48" cy="31" r="2" fill="#a5b4fc"/>

  <!-- Boca / Scanner -->
  <rect x="24" y="44" width="32" height="6" rx="3" fill="#1e1b4b"/>
  <rect x="26" y="45.5" width="8" height="3" rx="1.5" fill="#22c55e"/>
  <rect x="36" y="45.5" width="5" height="3" rx="1.5" fill="#4f46e5"/>
  <rect x="43" y="45.5" width="11" height="3" rx="1.5" fill="#334155"/>

  <!-- Orejas / conectores -->
  <rect x="8" y="28" width="8" height="16" rx="4" fill="#6366f1"/>
  <rect x="64" y="28" width="8" height="16" rx="4" fill="#6366f1"/>

  <!-- Cuello -->
  <rect x="32" y="56" width="16" height="8" rx="3" fill="#312e81"/>

  <!-- Base / cuerpo inferior -->
  <rect x="20" y="62" width="40" height="12" rx="6" fill="url(#bg)" opacity="0.7"/>
</svg>
